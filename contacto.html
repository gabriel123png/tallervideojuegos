<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contacto</title>
    <link rel="stylesheet" href="estilos.css">

</head>
<body>
    <h1>contactanos</h1>
    <section class="info-contacto" >
        <h2>¿tienes alguna duda?</h2>
        <p>Si deseas obtener más información sobre nuestros juegos,
        requisitos o configuraciones, puedes comunicarte con nosotros
        a través del siguiente formulario.</p>
        <br>

    </section>

    <div class="formulario" >

        <form action="">
            <label>Nombre Completo:</label><br>
            <input type="text" placeholder="Ingrese su nombre completo" required><br><br>

            <label>Correo Electrónico:</label><br>
            <input type="email" placeholder="Ingrese su correo" required><br><br>

            <label>Tipo de Consulta:</label><br>
            <select name="" id="">
                <option>Soporte Técnico</option>
                <option>Descarga de Juegos</option>
                <option>Instalación</option>
                <option>Configuración</option>


            </select><br><br>

            <label>Mensaje:</label><br>
            <textarea rows="5" placeholder="Escriba su mensaje aquí"></textarea><br><br>

            <button type="submit">Enviar Mensaje</button>

        </form>

    </div>
    <section class="redes" >
        <h2>Síguenos en nuestras redes</h2>
        <p>Facebook | Instagram | Twitter</p>

    </section>

    <footer>
        <div class="footer-contenido" >
            <a href="index.html">Inicio</a>
            <a href="noticias.html">Noticias</a>
            <a href="juegos.html">Juegos</a>
            <a href="contacto.html">Contacto</a>
        </div>
    </footer>
</body>
</html>
